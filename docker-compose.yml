services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: contosodashboard-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - contosodashboard-sqlserver-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  contosodashboard-sqlserver-data:
